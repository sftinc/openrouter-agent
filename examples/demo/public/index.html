<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>openrouter-agent demo</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div class="header-row">
      <h1>openrouter-agent demo</h1>
      <button type="button" id="new-chat">New chat</button>
    </div>
    <p class="subtitle">
      Tools available: <code>calculator</code>, <code>current_time</code>,
      <code>web_search</code>
    </p>
  </header>

  <main>
    <div id="messages" aria-live="polite"></div>
  </main>

  <form id="composer">
    <input
      id="input"
      type="text"
      autocomplete="off"
      placeholder="Ask something — try 'what's 347*29?' or 'what time is it in Tokyo?'"
      required
    />
    <button type="submit" id="send">Send</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.2/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.1/dist/purify.min.js"></script>
  <script type="module" src="/chat.js"></script>
</body>
</html>
